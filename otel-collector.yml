receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  otlp/newrelic:
    endpoint: ${NR_ENDPOINT}
    headers:
      api-key: ${MY_NEW_RELIC_API_KEY}
  debug:
    verbosity: normal

processors:
  batch: {}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, otlp/newrelic, debug]
